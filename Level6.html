<!DOCTYPE html>
<html>

<head>

<title>Happy Birthday ❤️</title>

<style>

body{

    margin:0;

    overflow:hidden;

    font-family:Arial,sans-serif;

    text-align:center;

    background-image:url("Level6Bg.png");

    background-size:cover;

    background-position:center;

    background-repeat:no-repeat;

    background-attachment:fixed;

}

h1{

    color:white;

    font-size:70px;

    margin-top:50px;

    text-shadow:

        0 0 15px gold,

        0 0 35px orange,

        0 0 50px white;

}

.wish{

    color:white;

    font-size:36px;

    font-weight:bold;

    text-shadow:

        0 0 10px gold,

        0 0 25px orange,

        0 0 40px white;

}

#wishBox{

    position:absolute;

    top:60%;

    left:50%;

    transform:translate(-50%,-50%);

    width:90%;

    text-align:center;

    color:white;

    font-size:42px;

    font-weight:bold;

    text-shadow:
        0 0 10px gold,
        0 0 20px orange,
        0 0 35px white;

}

.heart{

    position:fixed;

    bottom:-80px;

    font-size:35px;

    animation:floatHeart 8s linear forwards;

    pointer-events:none;

}

@keyframes floatHeart{

    from{

        transform:translateY(0px);

        opacity:1;

    }

    to{

        transform:translateY(-120vh);

        opacity:0;

    }

}

.wish{

    margin:10px 0;

    opacity:0;

    animation:fadeUp 1.2s forwards;

}

@keyframes fadeUp{

    from{

        opacity:0;

        transform:translateY(40px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

.explodeHeart{

    position:fixed;

    font-size:35px;

    pointer-events:none;

    z-index:9999;

    animation:explodeHeart 3s linear forwards;

}

@keyframes explodeHeart{

    from{

        transform:translate(0,0) scale(.5);

        opacity:1;

    }

    to{

        transform:
        translate(
        var(--x),
        var(--y))
        scale(1.8);

        opacity:0;

    }

}

.balloon{

    position:fixed;

    font-size:45px;

    pointer-events:none;

    z-index:9999;

    animation:explodeBalloon 4s linear forwards;

}

@keyframes explodeBalloon{

    from{

        transform:translate(0,0) scale(.5);

        opacity:1;

    }

    to{

        transform:
        translate(
        var(--x),
        var(--y))
        scale(1.4);

        opacity:0;

    }

}

.confetti{

    position:fixed;

    top:-30px;

    font-size:22px;

    z-index:9999;

    pointer-events:none;

    animation:confettiFall 5s linear forwards;

}

@keyframes confettiFall{

    from{

        transform:translateY(-50px) rotate(0deg);

        opacity:1;

    }

    to{

        transform:translateY(110vh) rotate(720deg);

        opacity:0;

    }

}

#endMessage{

    position:fixed;

    top:60%;

    left:50%;

    transform:translate(-50%,-50%);

    width:70%;

    text-align:center;

    color:white;

    font-size:28px;

    font-weight:bold;

    line-height:1.0;

    display:none;

    z-index:99999;

    text-shadow:
        0 0 10px gold,
        0 0 20px orange;

}

.fadeOut{

    animation:fadeOut 1.5s forwards;

}

@keyframes fadeOut{

    from{

        opacity:1;

    }

    to{

        opacity:0;

    }

}


#endMessage{

    opacity:0;

    animation:fadeIn 2s forwards;

}

@keyframes fadeIn{

    from{

        opacity:0;

        transform:translate(-50%,-45%);

    }

    to{

        opacity:1;

        transform:translate(-50%,-50%);

    }

}

</style>

</head>

<body>

   

<div id="wishBox"></div>

<script>

const wishes = [

"❤️ To The Best Husband ❤️",

"👶 To The Best Future Nanna ❤️",

"🥰 To Our Biggest Strength ❤️",

"🎂 Happy Birthday My Hero ❤️",

];

let currentWish = 0;


function showWish(){

    if(currentWish >= wishes.length){

        startCelebration();

        return;

    }

    let box = document.getElementById("wishBox");

    box.innerHTML += "<div class='wish'>" + wishes[currentWish] + "</div>";

    currentWish++;

    setTimeout(showWish,2500);

}
function createHeart(){

    let heart = document.createElement("div");

    heart.className = "heart";

    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * window.innerWidth + "px";

    document.body.appendChild(heart);

    setTimeout(function(){

        heart.remove();

    },8000);

}

function heartExplosion(){

    for(let i=0;i<120;i++){

        let heart=document.createElement("div");

        heart.className="explodeHeart";

        heart.innerHTML="❤️";

        heart.style.left=(window.innerWidth/2)+"px";

        heart.style.top=(window.innerHeight/2)+"px";

        let angle=Math.random()*360;

        let distance=250+Math.random()*350;

        let x=Math.cos(angle*Math.PI/180)*distance;

        let y=Math.sin(angle*Math.PI/180)*distance;

        heart.style.setProperty("--x",x+"px");

        heart.style.setProperty("--y",y+"px");

        document.body.appendChild(heart);

        setTimeout(function(){

            heart.remove();

        },3000);

    }

}

function balloonExplosion(){

    const balloons = ["🎈","🎈","🎈","🎈","🎉","🎊"];

    for(let i=0;i<70;i++){

        let balloon=document.createElement("div");

        balloon.className="balloon";

        balloon.innerHTML=balloons[Math.floor(Math.random()*balloons.length)];

        balloon.style.left=(window.innerWidth/2)+"px";

        balloon.style.top=(window.innerHeight/2)+"px";

        let angle=Math.random()*360;

        let distance=300+Math.random()*500;

        let x=Math.cos(angle*Math.PI/180)*distance;

        let y=Math.sin(angle*Math.PI/180)*distance;

        balloon.style.setProperty("--x",x+"px");

        balloon.style.setProperty("--y",y+"px");

        document.body.appendChild(balloon);

        setTimeout(function(){

            balloon.remove();

        },4000);

    }

}

function confettiExplosion(){

    const items=["🎉","✨","🎊","⭐","💛"];

    for(let i=0;i<150;i++){

        let conf=document.createElement("div");

        conf.className="confetti";

        conf.innerHTML=items[Math.floor(Math.random()*items.length)];

        conf.style.left=Math.random()*window.innerWidth+"px";

        conf.style.animationDelay=(Math.random()*2)+"s";

        document.body.appendChild(conf);

        setTimeout(function(){

            conf.remove();

        },6000);

    }

}

setTimeout(function(){

    // Fade out the wishes
    document.getElementById("wishBox").classList.add("fadeOut");

},10000);

setTimeout(function(){

    // Hide wishes completely
    document.getElementById("wishBox").style.display="none";

    // Show ending message
    document.getElementById("endMessage").style.display="block";

},11500);


setTimeout(function(){

    document.getElementById("wishBox").innerHTML = "";

    document.getElementById("endMessage").style.display="block";

},12000);

window.onload = function(){

    let song = document.getElementById("birthdaySong");

    song.currentTime = 0;

    song.play().catch(function(err){

        console.log(err);

    });

    showWish();

    setInterval(createHeart,500);

}

</script>

<div id="endMessage">

❤️ Thank You For Taking This Journey ❤️

<br>

Every moment with you is our favorite story....<br>

<br>

🎂 Happy Birthday Kannaya 🎂

<br><br><br><br><br>

From <br> Your Bujjuluu ❤️..............

</div>

<audio id="birthdaySong" autoplay loop>
    <source src="Last touch.mp3" type="audio/mpeg">
</audio>


</body>
</html>
