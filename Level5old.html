<!DOCTYPE html>
<html>

<head>

<title>Secret Message ❤️</title>

<style>

body{

    background:linear-gradient(
        135deg,
        #ffd6e8,
        #ffe4f2,
        #fff0f7
    );

    text-align:center;

    font-family:Arial, sans-serif;

    padding:30px;

}

h1{

    color:#d63384;

    font-size:50px;

}

#msg{

    background:white;

    width:70%;

    margin:auto;

    padding:30px;

    border-radius:20px;

    box-shadow:0px 0px 20px pink;

    color:#d63384;

    font-size:24px;

    line-height:1.8;

}

button{

    margin-top:25px;

    padding:15px 30px;

    font-size:22px;

    border:none;

    border-radius:50px;

    background:#ff66b3;

    color:white;

    cursor:pointer;

}

.babyExplosion{

    position:fixed;

    width:80px;

    height:80px;

    pointer-events:none;

    animation:floatBaby 5s linear forwards;

}

@keyframes floatBaby{

    from{

        transform:scale(0.5);

        opacity:1;

    }

    to{

        transform:
        translateY(-300px)
        scale(1.3);

        opacity:0;

    }

}

@keyframes explodeBaby{

    from{

        transform:scale(0);

        opacity:1;

    }

    to{

        transform:scale(2);

        opacity:0;

    }

}

.babyBubble{

    position:fixed;

    width:110px;

    height:110px;

    border-radius:50%;

    overflow:hidden;

    border:4px solid white;

    box-shadow:0 0 25px pink;

    pointer-events:none;

    z-index:999;

    animation:floatUp 8s linear forwards;

}

.babyBubble img{

    width:100%;

    height:100%;

    object-fit:cover;

    border-radius:50%;

}
.babyBubble img{

    width:100%;

    height:100%;

    object-fit:cover;

    border-radius:50%;

}

@keyframes floatUp{

    from{

        transform:translateY(0px);

        opacity:0;

    }

    20%{

        opacity:1;

    }

    to{

        transform:translateY(-120vh);

        opacity:0;

    }

}

.babyBubble{

    position:fixed;

    width:100px;

    height:100px;

    border-radius:50%;

    overflow:hidden;

    pointer-events:none;

    animation:floatUp 8s linear forwards;

    border:4px solid white;

    box-shadow:0 0 20px pink;

}

.babyBubble img{

    width:100%;

    height:100%;

    object-fit:cover;

    border-radius:50%;

}

@keyframes floatUp{

    from{

        transform:translateY(0px);

        opacity:0;

    }

    20%{

        opacity:1;

    }

    to{

        transform:translateY(-120vh);

        opacity:0;

    }

}

#babyBtn{

    background:#ff66b3;

    color:white;

    border:none;

    padding:15px 25px;

    border-radius:40px;

    font-size:20px;

    cursor:pointer;

    box-shadow:0 0 20px pink;

}

#babyPopup{

    display:none;

    position:fixed;

    top:50%;

    left:50%;

    transform:translate(-50%,-50%);

    background:white;

    padding:25px;

    border-radius:25px;

    box-shadow:0 0 40px pink;

    text-align:center;

    z-index:9999;

    animation:popBaby 1s ease;

}

#babyPic{

    width:320px;

    border-radius:20px;

    box-shadow:0 0 25px pink;

}

@keyframes popBaby{

    from{

        transform:translate(-50%,-50%) scale(0);

        opacity:0;

    }

    to{

        transform:translate(-50%,-50%) scale(1);

        opacity:1;

    }

}

.fadeIn{
    animation: fadeIn 2s;
}

@keyframes fadeIn{
    from{
        opacity:0;
    }
    to{
        opacity:1;
    }
}

</style>

</head>
